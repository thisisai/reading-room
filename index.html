<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Talk to Doc</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-state="loading">
    <!-- Loading splash -->
    <section class="state-loading" data-section="loading">
      <div class="loading-spinner" aria-label="載入中"></div>
    </section>

    <!-- State A: Not logged in -->
    <section class="state-a" data-section="a">
      <div class="hero">
        <h1 class="hero-title">Talk to Doc</h1>
        <p class="hero-subtitle">用你的 Claude.ai 訂閱跟自己上傳的 txt 檔案對話</p>
        <button id="loginBtn" class="btn-primary btn-lg" type="button">
          以 Claude.ai 登入
        </button>
        <p id="loginHint" class="hero-hint" hidden>
          已在新分頁開啟登入頁面，登入完成後本頁會自動繼續…
        </p>
      </div>
    </section>

    <!-- Top bar (shown in states B and C; visibility via [data-section] CSS) -->
    <header class="topbar" data-section="topbar">
      <div class="topbar-left">
        <span class="brand">Talk to Doc</span>
        <button id="newDocBtn" class="btn-ghost" type="button" hidden>
          新增文件
        </button>
      </div>
      <div class="topbar-right">
        <span id="userInfo" class="user-info"></span>
      </div>
    </header>

    <!-- State B: Logged in, awaiting upload -->
    <section class="state-b" data-section="b">
      <div class="upload-wrap">
        <label id="dropzone" class="dropzone" for="fileInput">
          <div class="dropzone-icon" aria-hidden="true">📄</div>
          <div class="dropzone-text">拖曳或點擊上傳 .txt 檔案</div>
          <div class="dropzone-hint">最大 5 MB</div>
          <input id="fileInput" type="file" accept=".txt,text/plain" hidden />
        </label>

        <div class="upload-or" aria-hidden="true"><span>或</span></div>

        <div class="paste-card">
          <label for="pasteTextarea" class="paste-label">直接貼上文字</label>
          <textarea
            id="pasteTextarea"
            class="paste-textarea"
            rows="8"
            placeholder="把文字貼到這裡（⌘V / Ctrl+V），按下方按鈕開始討論"
          ></textarea>
          <div class="paste-row">
            <span id="pasteCount" class="paste-count">0 字元</span>
            <button id="pasteSubmit" class="btn-primary" type="button" disabled>
              開始對話
            </button>
          </div>
        </div>

        <div id="uploadStatus" class="upload-status" hidden></div>
        <div id="uploadError" class="upload-error" hidden></div>
      </div>
    </section>

    <!-- State C: Chat -->
    <section class="state-c" data-section="c">
      <div class="chat-layout">
        <div class="pane pane-doc">
          <div class="pane-header">
            <span class="pane-title">
              <span aria-hidden="true">📄</span>
              <span id="docFilename">—</span>
            </span>
            <div class="doc-header-right">
              <span id="docCharCount" class="pane-meta"></span>
              <div class="doc-controls" role="group" aria-label="文件顯示控制">
                <div class="doc-control-group" role="group" aria-label="字體大小">
                  <button id="docFontSmaller" class="doc-control-btn" type="button" aria-label="縮小字體" title="縮小字體">A−</button>
                  <button id="docFontLarger" class="doc-control-btn" type="button" aria-label="放大字體" title="放大字體">A+</button>
                </div>
                <div class="doc-control-group" role="group" aria-label="左右邊距">
                  <button id="docMarginSmaller" class="doc-control-btn" type="button" aria-label="縮減左右邊距" title="左右邊距 −">←→</button>
                  <button id="docMarginLarger" class="doc-control-btn" type="button" aria-label="增加左右邊距" title="左右邊距 +">→←</button>
                </div>
                <button id="docPrefsReset" class="doc-control-reset" type="button" aria-label="重設字體與邊距" title="重設字體與邊距">重設</button>
              </div>
            </div>
          </div>
          <div id="docBody" class="doc-body" tabindex="0"></div>
        </div>
        <div
          id="paneDivider"
          class="pane-divider"
          role="separator"
          aria-orientation="vertical"
          aria-label="左右分欄寬度調整"
          tabindex="0"
        ></div>
        <div class="pane pane-chat">
          <div class="pane-header">
            <span class="pane-title">
              <span aria-hidden="true">💬</span>
              <span>對話</span>
            </span>
          </div>
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-footer">
            <div id="quotePill" class="quote-pill" hidden>
              <span id="quotePillText" class="quote-pill-text"></span>
              <button id="quotePillRemove" class="quote-pill-remove" type="button" aria-label="移除引用">×</button>
            </div>
            <div class="chat-input-row">
              <textarea
                id="chatInput"
                class="chat-input"
                rows="1"
                placeholder="輸入訊息（Enter 送出 / Shift+Enter 換行）"
              ></textarea>
              <button id="sendBtn" class="btn-primary" type="button" disabled>
                送出
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Floating "ask about selection" button -->
    <button id="selectionBtn" class="selection-btn" type="button" hidden>
      💬 針對這段提問
    </button>

    <script type="module" src="/client.js"></script>
  </body>
</html>
